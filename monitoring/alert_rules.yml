groups:
  - name: clothes-store-alerts
    rules:
      - alert: ClothesStoreServiceDown
        expr: up{job="clothes-store-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Clothes Store backend is down"
          description: "Prometheus cannot scrape the application for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          (
            sum(rate(clothes_store_http_requests_total{status=~"5.."}[2m]))
            /
            sum(rate(clothes_store_http_requests_total[2m]))
          ) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate"
          description: "More than 5% of requests are failing with 5xx for 2 minutes."
