# Prometheus config for Docker Swarm: scrape every backend replica via Swarm DNS (tasks.<service>).
# Used by docker-stack.yml. For plain docker compose use monitoring/prometheus.yml instead.

global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: "clothes-store-app"
    metrics_path: /metrics
    dns_sd_configs:
      - names:
          - tasks.backend
        type: A
        port: 8080
        refresh_interval: 15s

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
